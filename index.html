<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Tic Tac Toe</title>
</head>
<body>
    <!-- SETUP SCREEN -->
    <div class="setup-overlay" id="setupOverlay">
        <div class="setup-card">
            <div class="setup-header">
                <i class="fa-solid fa-table-cells" style="color: rgb(240, 120, 72); font-size:1.6rem;"></i>
                <h1 class="titulo">Tic Tac Toe</h1>
            </div>
            <h2 class="setup-subtitle">Configurar Jugadores</h2>

            <div class="setup-field">
                <label class="setup-label">
                    <i class="fa-solid fa-x" style="color: rgb(240, 120, 72);"></i> Player 1
                </label>
                <input id="input-p1" class="setup-input" type="text" placeholder="Nombre del jugador 1" maxlength="20" autocomplete="off"/>
            </div>

            <div class="setup-field">
                <label class="setup-label">
                    <i class="fa-regular fa-circle" style="color: rgb(154, 230, 154);"></i> Player 2
                </label>
                <input id="input-p2" class="setup-input setup-input-p2" type="text" placeholder="Nombre del jugador 2" maxlength="20" autocomplete="off"/>
            </div>

            <p id="setup-error" class="setup-error"></p>

            <button id="setup-start" class="setup-btn">
                <i class="fa-solid fa-play" style="margin-right:0.4rem;"></i>¡Comenzar Juego!
            </button>

            <footer>Creado por Ignacio</footer>
        </div>
    </div>

    <div class="tablero hidden">
        <div class="header">
            <div class="header-izquierda">
                <div class="icono">
                    <i class="fa-solid fa-table-cells" style="color: rgb(240, 120, 72);"></i>
                </div>
                <h1 class="titulo">Tic Tac Toe</h1>
            </div>
            <div class="header-derecha">
                <a target="_blank" href="https://github.com/IgnacioCastroT/Project-Tic-Tac-Toe"><button class="btn"><i class="fa-brands fa-github"></i></button></a>
                <button class="btn "><i class="fa-solid fa-gear" style="color: rgb(240, 120, 72);"></i></button>
            </div>
        </div>
        <div class="players">
            <div class="box-player player1">
                <i class="fa-regular fa-circle icono-player" style="color: rgb(240, 120, 72);"></i>
                <div class="name_jugador">Player 1</div>
                <div class="score_jugador">0</div>
            </div>
            <div class="box-player player2">
                <i class="fa-solid fa-x icono-player" style="color: rgb(154, 230, 154);"></i>
                <div class="name_jugador">Player 2</div>
                <div class="score_jugador">0</div>
            </div>
        </div>
        <div class="turn">Turno de Player 1</div>
        <div class="juego">
            <div data-index="0" class="casilla"></div>
            <div data-index="1" class="casilla"></div>
            <div data-index="2" class="casilla"></div>
            <div data-index="3" class="casilla"></div>
            <div data-index="4" class="casilla"></div>
            <div data-index="5" class="casilla"></div>
            <div data-index="6" class="casilla"></div>
            <div data-index="7" class="casilla"></div>
            <div data-index="8" class="casilla"></div>
        </div>
        <button id="reiniciarBtn" class="rest-game">Reiniciar Juego</button>
        <div class="reglas">El primero en obtener 3 puntos gana el juego!</div>
        <footer>Creado por Ignacio</footer>
    </div>

    <div class="info hidden" id="modalGanador">
        <div class="box-icon">
            <i class="fa-solid fa-trophy"></i>
        </div>
        <div class="ganador">¡Felicidades!</div>
        <div class="info-ganador"></div>
        <div class="ganador-sub"></div>
        <button class="rest-game btn-info">Jugar de nuevo</button>
    </div>

    <div class="info empate hidden" id="modalEmpate">
        <div class="box-icon">
            <i class="fa-regular fa-face-frown"></i>
        </div>
        <div class="text-empate ganador">¡Empate!</div>
        <p class="ganador-sub">Nadie ganó esta ronda. ¡El puntaje se mantiene!</p>
        <button class="btn-empate rest-game">Continuar</button>
    </div>
</body>
</html>
