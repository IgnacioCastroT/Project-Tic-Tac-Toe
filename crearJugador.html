<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee1a17",
                        "secondary": "#2b5bb3",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221010",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Tic Tac Toe - Setup</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Main Setup Container -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-primary/10">
<!-- Header/Top Bar Component -->
<header class="flex items-center justify-between border-b border-primary/5 px-6 py-4 bg-white dark:bg-slate-900">
<div class="flex items-center gap-3">
<div class="bg-primary p-1.5 rounded-lg">
<span class="material-symbols-outlined text-white text-xl">grid_view</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">Tic Tac Toe - Players</h2>
</div>
</header>
<!-- Content Area -->
<div class="p-8 space-y-8">
<!-- Title & Subtitle -->
<div class="text-center">
<h1 class="text-3xl font-extrabold text-slate-900 dark:text-slate-100 tracking-tight">Configurar Jugadores</h1>
</div>
<div class="space-y-6">
<!-- Player 1 Input -->
<div class="space-y-2">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Player 1 (X)</label>
<div class="relative group">
<input class="w-full h-14 pl-5 pr-12 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none text-slate-900 dark:text-slate-100 font-medium" placeholder="Enter name" type="text" value="Mario"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined font-bold" data-icon="close">close</span>
</div>
</div>
</div>
<!-- Opponent Toggle -->
<div class="space-y-3">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Choose Opponent</label>
<div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer hidden" name="opponent" type="radio" value="human"/>
<div class="flex items-center justify-center py-2.5 rounded-lg text-sm font-bold transition-all peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm peer-checked:text-primary text-slate-500">
<span class="material-symbols-outlined mr-2 text-lg">person</span>
                                Human
                            </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer hidden" name="opponent" type="radio" value="cpu"/>
<div class="flex items-center justify-center py-2.5 rounded-lg text-sm font-bold transition-all peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm peer-checked:text-secondary text-slate-500">
<span class="material-symbols-outlined mr-2 text-lg">smart_toy</span>
                                CPU
                            </div>
</label>
</div>
</div>
<!-- Conditional Input: Player 2 (Human) -->
<div class="space-y-2">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Player 2 (O)</label>
<div class="relative group">
<input class="w-full h-14 pl-5 pr-12 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-secondary focus:ring-4 focus:ring-secondary/10 transition-all outline-none text-slate-900 dark:text-slate-100 font-medium" placeholder="Enter name" type="text" value="Luigi"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary">
<span class="material-symbols-outlined font-bold" data-icon="circle">circle</span>
</div>
</div>
</div>
<!-- Difficulty Selection (Subtle) -->
<div class="hidden space-y-2">
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">CPU Difficulty</label>
<select class="w-full h-14 px-5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-secondary transition-all outline-none appearance-none">
<option>Easy Peasy</option>
<option selected="">Normal Mushroom</option>
<option>Bowser Hard</option>
</select>
</div>
</div>
<!-- Start Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold text-lg py-5 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined">play_circle</span>
                START GAME
            </button>
<!-- Decorative Elements -->
<div class="flex justify-center gap-8 pt-4 opacity-20 grayscale">
<img alt="Cute mushroom icon" class="w-8 h-8" data-alt="Small red mushroom icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEHueBtP1cPYLdhnsJmRDoR1wnzeXpEidBAJ2gCO4LYNsrVqvFCEhjJgkBW8ejtxb6aF0vUEnuNwusQ-d-KO5tEmAI60EfJxqaCpS1XFEGcWhocnmeQjZRHQLYTQ8EELAP1d32KVg0b-_qPK1GJa14bNybjxJDQU_BDvMHtE-_IAgEf5rId1E5UsKOsgnULcw4qYhY3j4ubZIbmyMD3I9FakQRHNSdxUM_tR56m6Seij3XjCtr8i0185rNYKkmgjlzHUXVVKfn4yMY"/>
<img alt="Golden star icon" class="w-8 h-8" data-alt="Small golden star icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuu_ysWak7tBd-MC2qYxyBBLB8ZZs3-T5PgJ-BALrbbbN_Ga7zZLuvKmoewLcydMq_BqnUGHQCyahZvxOHXPU3_urOwQrUAnuW9KxeTlx2hGLzRRD5EwKkstCZUciFI-QhW37N7ra0Tu6GubOaZy1Z5fulOeGJ5dR8hrbX_22kMRpWVxZhLFZ0T96L8hCn20tUYNsnmN_HOan_z6H6NAHv-RbWtzQSJf1XJbnJK3JdQK2mCykAGD4C9ucHmUXa-pYyq1L9tv5JpQPW"/>
<img alt="Cute blue mushroom icon" class="w-8 h-8" data-alt="Small blue mushroom icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCX2B_SQ_CbEKIYEUc1HXEKxb8EAW30j-NTaPywtiaKcgVt1a07QSPgI3bv5tzBkmr56vsWHN2yxVq04PowtpbE0lXG8gb-CX9s9aT-dlH-lfyK9kSWl0q70sUEaznv76JbLtUoNNCjiBLuFeFYd8QEHdlyzgeOh49jTR1CqdMAaWQps3_l6kVVfuUFfPus7RFppKIyfOrIyOpdIiDBE6lkMS5Yupnu6HyZtgIg3mQoTFEWCM5rJWQ7dmBYLNtM12Ge_BADU2Y0r3n8"/>
</div>
</div>
</div>
</body></html>
